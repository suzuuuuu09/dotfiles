name: "CI: WezTerm config lint"

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/wezterm-linter.yaml
      - .github/actions/setup-nix/action.yaml
      - .config/wezterm/**
  pull_request:
    paths:
      - .github/workflows/wezterm-linter.yaml
      - .github/actions/setup-nix/action.yaml
      - .config/wezterm/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-wezterm:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          skipPush: "true"

      - name: Install GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1

      - name: Check WezTerm config
        run: |
          set -euo pipefail

          LOG="$(mktemp)"
          TRUE_CMD="$(command -v true)"

          set +e
          xvfb-run -a nix shell nixpkgs#wezterm -c wezterm \
            --config-file "$GITHUB_WORKSPACE/.config/wezterm/wezterm.lua" \
            start --no-auto-connect -- "$TRUE_CMD" > "$LOG" 2>&1
          CODE="$?"
          set -e

          cat "$LOG"

          if [ "$CODE" -ne 0 ]; then
            echo "WezTerm exited with non-zero status: $CODE"
            exit "$CODE"
          fi

          if grep -Eiq \
            "Config::from_dynamic|not a valid Config field|stack traceback|in function 'require'|module .* not found|Failed to load|error converting Lua table to Config" \
            "$LOG"; then
            echo "WezTerm config validation failed"
            exit 1
          fi
