name: 'CI: Neovim plugins'

on:
  push:
    branches:
      - main
    paths:
      - ".config/nvim/**"
      - "scripts/nvim-restore.sh"
      - "flake.lock"
      - "flake.nix"
      - ".github/workflows/nix-nvim.yaml"
      - ".github/actions/setup-nix/action.yaml"
  pull_request:
    paths:
      - ".config/nvim/**"
      - "scripts/nvim-restore.sh"
      - "flake.lock"
      - "flake.nix"
      - ".github/workflows/nix-nvim.yaml"
      - ".github/actions/setup-nix/action.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-nvim:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Link Neovim config
        run: |
          mkdir -p ~/.config
          ln -s "$PWD/.config/nvim" ~/.config/nvim

      - name: Restore Neovim plugins
        run: |
          nix shell nixpkgs#neovim nixpkgs#git -c ./scripts/nvim-restore.sh ~/.config/nvim

      - name: Check Neovim configuration
        run: |
          nix shell nixpkgs#neovim nixpkgs#git -c nvim --headless '+qa'
