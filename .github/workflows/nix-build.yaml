name: 'CI: Nix Build'

on:
  push:
    branches:
      - main
    paths:
      - "**.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yaml"
      - ".github/actions/setup-nix/action.yaml"
  pull_request:
    paths:
      - "**.nix"
      - "flake.lock"
      - ".github/workflows/nix-build.yaml"
      - ".github/actions/setup-nix/action.yaml"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ github.event_name == 'pull_request' }}

      - name: Build darwinConfigurations
        run: nix build --show-trace --no-link .#darwinConfigurations.suzuMac.system

      - name: Print disk usage
        run: df -h
