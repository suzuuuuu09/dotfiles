name: 'Bot: Renovate'

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 * * * *'
  push:
    branches:
      - main
    paths:
      - '.github/renovate.jsonc'
      - '.github/workflows/renovate.yaml'

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SUZUUUUU09_RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.SUZUUUUU09_RENOVATE_PRIVATE_KEY }}

          permission-administration: read
          permission-checks: write
          permission-contents: write
          permission-issues: write
          permission-members: read
          permission-metadata: read
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write
          
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: 'suzuuuuu09/dotfiles'
          NODE_OPTIONS: '--max-old-space-size=4096'
