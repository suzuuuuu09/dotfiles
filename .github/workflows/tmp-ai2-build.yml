name: Temporary AI2 Typst build

on:
  push:
    branches:
      - tmp-ai2-cheatsheet-build
    paths:
      - "tmp-ai2-build/**"
      - ".github/workflows/tmp-ai2-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "tmp-ai2-build/**"
      - ".github/workflows/tmp-ai2-build.yml"

permissions:
  contents: read

env:
  SOURCE_DATE_EPOCH: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      - name: Install Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.14.2"
      - name: Compile
        run: typst compile tmp-ai2-build/ai2_cheatsheet.typ tmp-ai2-build/ai2_cheatsheet.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ai2-cheatsheet
          path: tmp-ai2-build/ai2_cheatsheet.pdf
          if-no-files-found: error
          retention-days: 1
